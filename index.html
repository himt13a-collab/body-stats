<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Stats</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Body Stats</h1>
    <div id="deviceId" class="device-id"></div>
  </header>

  <section class="card">
    <h2>Цель</h2>
    <div class="goal-row">
      <label for="goalWeightInput">Целевой вес (кг)</label>
      <input type="number" id="goalWeightInput" step="0.1" placeholder="—">
      <button id="saveGoalBtn">Сохранить</button>
    </div>
  </section>

  <section class="card">
    <h2>Добавить замер</h2>
    <form id="entryForm" class="entry-form">
      <select id="metricSelect"></select>
      <input type="date" id="dateInput" required>
      <input type="number" id="valueInput" step="0.1" required placeholder="Значение">
      <button type="submit">Добавить</button>
    </form>
    <p id="formStatus" class="status"></p>
  </section>

  <main id="chartsContainer"></main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
